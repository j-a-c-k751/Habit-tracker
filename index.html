<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<title>Habit Tracker</title>
<style>
  :root {
    --bg: #14171c;
    --panel: #1c2028;
    --panel-raised: #232833;
    --line: #2e3440;
    --text: #e8e6e0;
    --text-dim: #8b93a3;
    --amber: #e8a33d;
    --amber-dim: #6b4f22;
    --green: #4caf6d;
    --danger: #c96a5a;
    --font-display: 'Courier New', monospace;
    --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding: 20px 16px 100px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 4px;
    padding: 8px 4px 20px;
    border-bottom: 1px solid var(--line);
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  header .date {
    font-family: var(--font-display);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  #view-tabs {
    display: flex;
    gap: 6px;
    margin-top: 16px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 4px;
  }

  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 8px 0;
    border-radius: 6px;
    cursor: pointer;
  }

  .tab-btn.active {
    background: var(--panel-raised);
    color: var(--amber);
  }

  #habit-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
  }

  #month-view {
    margin-top: 16px;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 16px;
  }

  .month-nav button {
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  .month-label {
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--text);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 6px;
  }

  .cal-weekday {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font-display);
    padding-bottom: 4px;
  }

  .cal-day {
    aspect-ratio: 1;
    border-radius: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: var(--text-dim);
    position: relative;
  }

  .cal-day.empty {
    background: none;
    border: none;
  }

  .cal-day.future {
    color: var(--text-dim);
    opacity: 0.4;
  }

  .cal-day.not-tracked {
    color: var(--text-dim);
    opacity: 0.25;
  }

  .cal-day.complete {
    background: var(--green);
    border-color: var(--green);
    color: #0e1a10;
    font-weight: 700;
  }

  .cal-day.partial {
    background: var(--amber);
    border-color: var(--amber);
    color: #241a06;
    font-weight: 700;
  }

  .cal-day.low {
    background: var(--danger);
    border-color: var(--danger);
    color: #240e0a;
    font-weight: 700;
  }

  .cal-day.today-marker {
    box-shadow: 0 0 0 2px var(--text);
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-dim);
  }

  .dot-key {
    width: 10px;
    height: 10px;
    border-radius: 3px;
    display: inline-block;
  }

  /* ---------- Day editor modal ---------- */
  #day-editor-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 10;
    align-items: flex-end;
  }

  #day-editor-overlay.open {
    display: flex;
  }

  #day-editor-panel {
    background: var(--panel-raised);
    border-top: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 75vh;
    overflow-y: auto;
    padding: 18px 16px calc(24px + env(safe-area-inset-bottom));
  }

  .editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .editor-date {
    font-family: var(--font-display);
    font-size: 14px;
    letter-spacing: 1px;
    color: var(--text);
  }

  #editor-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    padding: 4px 8px;
  }

  .editor-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 4px;
    border-bottom: 1px solid var(--line);
  }

  .editor-row:last-child {
    border-bottom: none;
  }

  .editor-row-name {
    font-size: 15px;
    flex: 1;
    margin-right: 12px;
  }

  #editor-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px 0;
  }

  .habit-card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 14px 12px;
    position: relative;
    overflow: hidden;
  }

  .habit-card.done {
    border-color: var(--amber-dim);
  }

  .habit-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .habit-name {
    font-size: 16px;
    font-weight: 500;
    flex: 1;
    min-width: 0;
    overflow-wrap: break-word;
  }

  .streak-readout {
    font-family: var(--font-display);
    font-size: 13px;
    color: var(--amber);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .streak-readout .label {
    color: var(--text-dim);
    font-size: 10px;
    display: block;
    text-align: right;
  }

  /* Breaker switch toggle */
  .switch {
    width: 52px;
    height: 30px;
    background: #0e1014;
    border: 1px solid var(--line);
    border-radius: 6px;
    position: relative;
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.15s ease;
  }

  .switch .lever {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 22px;
    height: 22px;
    background: linear-gradient(180deg, #4a5060, #383d4a);
    border-radius: 4px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.4);
    transition: transform 0.18s cubic-bezier(.4,0,.2,1), background 0.18s ease;
  }

  .switch.on {
    border-color: var(--amber-dim);
  }

  .switch.on .lever {
    transform: translateX(22px);
    background: linear-gradient(180deg, #ffc266, var(--amber));
    box-shadow: 0 0 8px rgba(232, 163, 61, 0.6);
  }

  .week-dots {
    display: flex;
    gap: 6px;
    margin-top: 12px;
  }

  .dot-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }

  .dot {
    width: 100%;
    aspect-ratio: 1;
    max-width: 20px;
    border-radius: 3px;
    background: #0e1014;
    border: 1px solid var(--line);
  }

  .dot.filled {
    background: var(--amber);
    border-color: var(--amber);
  }

  .dot.today {
    box-shadow: 0 0 0 1px var(--text-dim);
  }

  .day-label {
    font-size: 9px;
    color: var(--text-dim);
    font-family: var(--font-display);
  }

  .habit-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 8px;
    cursor: pointer;
  }

  .delete-btn:active {
    color: var(--danger);
  }

  #empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  #empty-state .big {
    font-size: 15px;
    margin-bottom: 6px;
    color: var(--text);
  }

  #empty-state .small {
    font-size: 13px;
  }

  #add-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--panel-raised);
    border-top: 1px solid var(--line);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
  }

  #new-habit-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 14px;
    font-size: 15px;
    font-family: var(--font-body);
  }

  #new-habit-input:focus {
    outline: none;
    border-color: var(--amber-dim);
  }

  #add-btn {
    background: var(--amber);
    border: none;
    border-radius: 8px;
    color: #1a1408;
    font-weight: 700;
    font-size: 20px;
    width: 46px;
    height: 46px;
    cursor: pointer;
  }

  #add-btn:active {
    background: #cf8f2f;
  }
</style>
</head>
<body>

<header>
  <h1>Habits</h1>
  <div class="date" id="today-label"></div>
</header>

<div id="view-tabs">
  <button class="tab-btn active" data-view="day">TODAY</button>
  <button class="tab-btn" data-view="month">MONTH</button>
</div>

<div id="habit-list"></div>

<div id="month-view" style="display:none;">
  <div class="month-nav">
    <button id="prev-month">&#8592;</button>
    <div class="month-label" id="month-label"></div>
    <button id="next-month">&#8594;</button>
  </div>
  <div class="cal-grid" id="cal-weekdays"></div>
  <div class="cal-grid" id="cal-days"></div>
  <div class="legend">
    <div class="legend-item"><span class="dot-key" style="background:var(--green)"></span>100%</div>
    <div class="legend-item"><span class="dot-key" style="background:var(--amber)"></span>50-99%</div>
    <div class="legend-item"><span class="dot-key" style="background:var(--danger)"></span>&lt;50%</div>
  </div>
</div>

<div id="empty-state" style="display:none;">
  <div class="big">No habits yet</div>
  <div class="small">Add one below to get started</div>
</div>

<div id="add-bar">
  <input type="text" id="new-habit-input" placeholder="New habit (e.g. Drink water)" maxlength="40">
  <button id="add-btn">+</button>
</div>

<div id="day-editor-overlay">
  <div id="day-editor-panel">
    <div class="editor-header">
      <div class="editor-date" id="editor-date-label"></div>
      <button id="editor-close">&times;</button>
    </div>
    <div id="editor-habit-list"></div>
    <div id="editor-empty" style="display:none;">No habits existed yet on this day.</div>
  </div>
</div>

<script>
  // ---------- Data model ----------
  // Each habit: { id, name, completedDates: ["2026-07-01", ...] }
  // Dates stored as YYYY-MM-DD strings in local time.

  const STORAGE_KEY = 'habitTrackerData';
  const START_DATE_KEY = 'habitTrackerStartDate';

  // The date tracking began. Set once, on first ever load, and never changed
  // after that — this is what lets us grey out "before I started" days.
  function getStartDate() {
    let s = localStorage.getItem(START_DATE_KEY);
    if (!s) {
      s = todayStr();
      localStorage.setItem(START_DATE_KEY, s);
    }
    return s;
  }

  function loadHabits() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      const parsed = raw ? JSON.parse(raw) : [];
      // Migration: older saved habits may lack createdDate/archivedDate.
      // Treat them as having existed since "the beginning" so old data doesn't shift.
      return parsed.map(h => ({
        ...h,
        createdDate: h.createdDate || '2000-01-01',
        archivedDate: h.archivedDate || null
      }));
    } catch (e) {
      console.error('Failed to load habits', e);
      return [];
    }
  }

  function saveHabits(habits) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function dateStrDaysAgo(n) {
    const d = new Date();
    d.setDate(d.getDate() - n);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Calculates current streak: consecutive days ending today (or yesterday if today not done yet)
  function calcStreak(completedDates) {
    const set = new Set(completedDates);
    let streak = 0;
    let offset = set.has(todayStr()) ? 0 : 1;
    // if today isn't done, streak counts back from yesterday (so it doesn't zero out mid-day)
    while (set.has(dateStrDaysAgo(offset))) {
      streak++;
      offset++;
    }
    return streak;
  }

  let habits = loadHabits();
  const trackerStartDate = getStartDate();

  // ---------- Rendering ----------
  const listEl = document.getElementById('habit-list');
  const emptyEl = document.getElementById('empty-state');

  const dayLabels = ['S','M','T','W','T','F','S'];

  function render() {
    listEl.innerHTML = '';
    const activeHabits = habits.filter(h => !h.archivedDate);
    emptyEl.style.display = activeHabits.length === 0 ? 'block' : 'none';

    const today = todayStr();

    activeHabits.forEach(habit => {
      const isDoneToday = habit.completedDates.includes(today);
      const streak = calcStreak(habit.completedDates);

      const card = document.createElement('div');
      card.className = 'habit-card' + (isDoneToday ? ' done' : '');

      // Build last-7-days dot row, oldest to newest, ending today
      let dotsHtml = '';
      for (let i = 6; i >= 0; i--) {
        const ds = dateStrDaysAgo(i);
        const filled = habit.completedDates.includes(ds);
        const isToday = i === 0;
        const dow = new Date(ds + 'T00:00:00').getDay();
        dotsHtml += `
          <div class="dot-col">
            <div class="dot ${filled ? 'filled' : ''} ${isToday ? 'today' : ''}"></div>
            <div class="day-label">${dayLabels[dow]}</div>
          </div>`;
      }

      card.innerHTML = `
        <div class="habit-top">
          <div class="habit-name">${escapeHtml(habit.name)}</div>
          <div class="streak-readout">
            <span class="label">STREAK</span>
            ${streak} ${streak === 1 ? 'day' : 'days'}
          </div>
        </div>
        <div class="habit-top" style="margin-top:12px; align-items:center;">
          <div class="switch ${isDoneToday ? 'on' : ''}" data-id="${habit.id}">
            <div class="lever"></div>
          </div>
          <div class="week-dots" style="flex:1; margin-top:0; margin-left:14px;">${dotsHtml}</div>
        </div>
        <div class="habit-actions">
          <button class="delete-btn" data-id="${habit.id}">Remove</button>
        </div>
      `;

      listEl.appendChild(card);
    });

    // Wire up toggle switches
    listEl.querySelectorAll('.switch').forEach(el => {
      el.addEventListener('click', () => toggleToday(el.dataset.id));
    });

    // Wire up delete buttons
    listEl.querySelectorAll('.delete-btn').forEach(el => {
      el.addEventListener('click', () => removeHabit(el.dataset.id));
    });
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Actions ----------
  function addHabit(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    habits.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      name: trimmed,
      completedDates: [],
      createdDate: todayStr(),
      archivedDate: null
    });
    saveHabits(habits);
    render();
  }

  function toggleDate(id, dateStr) {
    const habit = habits.find(h => h.id === id);
    if (!habit) return;
    const idx = habit.completedDates.indexOf(dateStr);
    if (idx === -1) {
      habit.completedDates.push(dateStr);
    } else {
      habit.completedDates.splice(idx, 1);
    }
    saveHabits(habits);
  }

  function toggleToday(id) {
    toggleDate(id, todayStr());
    render();
  }

  function removeHabit(id) {
    const habit = habits.find(h => h.id === id);
    if (!habit) return;
    // Soft-archive rather than delete, so past calendar days keep their
    // correct percentages instead of retroactively changing.
    habit.archivedDate = todayStr();
    saveHabits(habits);
    render();
  }

  // ---------- Add bar wiring ----------
  const input = document.getElementById('new-habit-input');
  const addBtn = document.getElementById('add-btn');

  addBtn.addEventListener('click', () => {
    addHabit(input.value);
    input.value = '';
    input.focus();
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      addHabit(input.value);
      input.value = '';
    }
  });

  // ---------- Header date ----------
  document.getElementById('today-label').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }).toUpperCase();

  // ---------- View switching ----------
  const dayListEl = document.getElementById('habit-list');
  const monthViewEl = document.getElementById('month-view');
  const tabBtns = document.querySelectorAll('.tab-btn');

  tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (btn.dataset.view === 'day') {
        dayListEl.style.display = 'flex';
        emptyEl.style.display = habits.filter(h => !h.archivedDate).length === 0 ? 'block' : 'none';
        monthViewEl.style.display = 'none';
      } else {
        dayListEl.style.display = 'none';
        emptyEl.style.display = 'none';
        monthViewEl.style.display = 'block';
        renderMonth();
      }
    });
  });

  // ---------- Month view ----------
  const today = new Date();
  let calYear = today.getFullYear();
  let calMonth = today.getMonth(); // 0-indexed

  const monthNames = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

  document.getElementById('prev-month').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderMonth();
  });

  document.getElementById('next-month').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    renderMonth();
  });

  function pad(n) { return String(n).padStart(2, '0'); }

  // Completion ratio for a given YYYY-MM-DD, counting only habits that
  // actually existed (created, and not yet archived) on that day.
  function habitsActiveOn(dateStr) {
    return habits.filter(h =>
      h.createdDate <= dateStr && (!h.archivedDate || dateStr <= h.archivedDate)
    );
  }

  function completionRatio(dateStr) {
    const active = habitsActiveOn(dateStr);
    if (active.length === 0) return null;
    const doneCount = active.filter(h => h.completedDates.includes(dateStr)).length;
    return doneCount / active.length;
  }

  function renderMonth() {
    document.getElementById('month-label').textContent =
      `${monthNames[calMonth].toUpperCase()} ${calYear}`;

    // Weekday headers (only need to draw once, but cheap to redo)
    const weekdaysEl = document.getElementById('cal-weekdays');
    weekdaysEl.innerHTML = ['S','M','T','W','T','F','S']
      .map(d => `<div class="cal-weekday">${d}</div>`).join('');

    const daysEl = document.getElementById('cal-days');
    daysEl.innerHTML = '';

    const firstOfMonth = new Date(calYear, calMonth, 1);
    const startWeekday = firstOfMonth.getDay(); // 0 = Sunday
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const todayStrVal = todayStr();

    // Leading blanks
    for (let i = 0; i < startWeekday; i++) {
      daysEl.innerHTML += `<div class="cal-day empty"></div>`;
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${calYear}-${pad(calMonth + 1)}-${pad(day)}`;
      const isFuture = dateStr > todayStrVal;
      const isBeforeStart = dateStr < trackerStartDate;
      const isToday = dateStr === todayStrVal;

      let cls = 'cal-day';
      if (isFuture || isBeforeStart) {
        cls += isBeforeStart ? ' not-tracked' : ' future';
      } else {
        const ratio = completionRatio(dateStr);
        if (ratio === null) {
          // no habits exist at all — leave neutral
        } else if (ratio >= 1) {
          cls += ' complete';
        } else if (ratio >= 0.5) {
          cls += ' partial';
        } else {
          cls += ' low';
        }
      }
      if (isToday) cls += ' today-marker';

      const clickAttr = (isFuture || isBeforeStart) ? '' : `data-date="${dateStr}"`;
      daysEl.innerHTML += `<div class="${cls}" ${clickAttr}>${day}</div>`;
    }

    // Wire up click handlers for editable (non-future) days
    daysEl.querySelectorAll('.cal-day[data-date]').forEach(el => {
      el.addEventListener('click', () => openDayEditor(el.dataset.date));
    });
  }

  // ---------- Day editor modal ----------
  const editorOverlay = document.getElementById('day-editor-overlay');
  const editorList = document.getElementById('editor-habit-list');
  const editorEmpty = document.getElementById('editor-empty');
  const editorDateLabel = document.getElementById('editor-date-label');

  function openDayEditor(dateStr) {
    if (dateStr < trackerStartDate) return; // safety guard — shouldn't be reachable anyway
    const activeThatDay = habitsActiveOn(dateStr);
    editorDateLabel.textContent = new Date(dateStr + 'T00:00:00')
      .toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })
      .toUpperCase();

    editorList.innerHTML = '';
    editorEmpty.style.display = activeThatDay.length === 0 ? 'block' : 'none';

    activeThatDay.forEach(habit => {
      const isDone = habit.completedDates.includes(dateStr);
      const row = document.createElement('div');
      row.className = 'editor-row';
      row.innerHTML = `
        <div class="editor-row-name">${escapeHtml(habit.name)}</div>
        <div class="switch ${isDone ? 'on' : ''}" data-id="${habit.id}">
          <div class="lever"></div>
        </div>
      `;
      editorList.appendChild(row);
    });

    editorList.querySelectorAll('.switch').forEach(el => {
      el.addEventListener('click', () => {
        toggleDate(el.dataset.id, dateStr);
        el.classList.toggle('on');
        renderMonth(); // refresh the calendar colors behind the modal
      });
    });

    editorOverlay.classList.add('open');
  }

  document.getElementById('editor-close').addEventListener('click', () => {
    editorOverlay.classList.remove('open');
    render(); // in case today's data was edited via the modal
  });

  editorOverlay.addEventListener('click', (e) => {
    if (e.target === editorOverlay) {
      editorOverlay.classList.remove('open');
      render();
    }
  });

  // ---------- Initial render ----------
  render();
</script>

</body>
</html>
